server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(js|css|ico|png|jpg|jpeg|svg|gif|woff|woff2|ttf)$ {
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
